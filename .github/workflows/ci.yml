name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Linting
        [cite_start]run: npm run lint # Ensures code follows best practices [cite: 193]

      - name: Type Checking
        [cite_start]run: npx tsc --noEmit # Ensures no TypeScript errors [cite: 194]

      - name: Build Project
        [cite_start]run: npm run build # Verifies project can successfully compile [cite: 221]